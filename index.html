<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Raft Consensus Visualizer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --border: #2a2e3a;
    --text: #e6e8ee;
    --muted: #8b90a0;
    --leader: #f5c451;
    --candidate: #ef8354;
    --follower: #4f8cff;
    --dead: #3a3d47;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 18px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    min-height: 0;
  }
  #canvasWrap { position: relative; }
  canvas { width: 100%; height: 100%; display: block; }
  #panel {
    border-left: 1px solid var(--border);
    background: var(--panel);
    padding: 16px;
    overflow-y: auto;
  }
  #panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 18px 0 8px; }
  #panel h2:first-child { margin-top: 0; }
  button {
    background: #232838;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    cursor: pointer;
    margin: 3px 3px 3px 0;
  }
  button:hover { background: #2b3145; }
  button.active { border-color: var(--leader); color: var(--leader); }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  input[type="range"] { width: 100%; }
  .row { margin-bottom: 12px; }
  .node-btns { display: flex; flex-wrap: wrap; gap: 4px; }
  .legend { font-size: 12px; color: var(--muted); line-height: 1.9; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
  #log {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    max-height: 220px;
    overflow-y: auto;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <header>
    <h1>Raft Consensus Visualizer</h1>
    <p>Leader election &amp; log replication, simulated on a virtual clock. Partition or kill nodes and watch the cluster recover.</p>
  </header>
  <main>
    <div id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
    <div id="panel">
      <h2>Playback</h2>
      <div class="row">
        <button id="playPause">Pause</button>
        <button id="reset">Reset</button>
      </div>
      <div class="row">
        <label for="speed">Simulation speed (<span id="speedVal">1x</span>)</label>
        <input type="range" id="speed" min="0.25" max="8" step="0.25" value="1" />
      </div>

      <h2>Client</h2>
      <div class="row">
        <button id="writeCmd">Send write to leader</button>
      </div>

      <h2>Fault injection</h2>
      <div class="row node-btns" id="partitionBtns"></div>
      <div class="row node-btns" id="killBtns"></div>
      <div class="row">
        <button id="healAll">Heal all partitions</button>
      </div>

      <h2>Legend</h2>
      <div class="legend">
        <div><span class="swatch" style="background:var(--leader)"></span>Leader</div>
        <div><span class="swatch" style="background:var(--candidate)"></span>Candidate</div>
        <div><span class="swatch" style="background:var(--follower)"></span>Follower</div>
        <div><span class="swatch" style="background:var(--dead)"></span>Dead / partitioned</div>
      </div>

      <h2>Event log</h2>
      <div id="log"></div>
    </div>
  </main>
  <script type="module" src="src/ui.js"></script>
</body>
</html>
